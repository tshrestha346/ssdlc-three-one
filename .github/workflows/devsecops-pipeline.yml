name: DevSecOps Pipeline

# One job, run step by step - each step maps directly onto an SDLC stage.
# This keeps the pipeline easy to explain: Code -> Build -> Test -> Security Gates.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secure-sdlc-pipeline:
    name: Secure SDLC Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      # ---- CODE STAGE ----
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- BUILD STAGE ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ---- TEST STAGE ----
      - name: Run tests
        run: npm test

      # ---- SECURITY GATE 1: Secrets scanning ----
      # Looks for hardcoded passwords, API keys, tokens in the codebase.
      - name: Scan for hardcoded secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- SECURITY GATE 2: Static Application Security Testing (SAST) ----
      # Reads the source code itself looking for dangerous patterns (e.g. eval()).
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run static code analysis (Semgrep)
        run: semgrep --config=p/security-audit --error .

      # ---- SECURITY GATE 3: Software Composition Analysis (SCA) ----
      # Checks all third-party dependencies against known CVE databases.
      - name: Scan dependencies for known vulnerabilities (npm audit)
        run: npm audit --audit-level=high
