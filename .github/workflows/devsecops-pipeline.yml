name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secure-sdlc-pipeline:
    name: Secure SDLC Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Scan for hardcoded secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run static code analysis (Semgrep)
        run: semgrep --config=p/security-audit --config=semgrep-rules.yml --error .

      - name: Scan dependencies for known vulnerabilities (npm audit)
        run: npm audit --audit-level=high
